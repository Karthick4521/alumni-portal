<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Event Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #e65100, #f57c00);
            padding: 15px 30px;
        }
        .topnav .brand {
            color: white; font-size: 1.3rem;
            font-weight: 700; text-decoration: none;
        }
        .event-banner {
            background: linear-gradient(135deg, #e65100, #f57c00);
            color: white; padding: 40px;
            border-radius: 20px; margin-bottom: 25px;
        }
        .info-card {
            background: white; border-radius: 16px;
            padding: 25px; box-shadow: 0 3px 15px rgba(0,0,0,0.07);
            margin-bottom: 20px;
        }
        .info-card h6 {
            font-size: 0.78rem; text-transform: uppercase;
            letter-spacing: 1px; color: #e65100;
            font-weight: 700; margin-bottom: 15px;
            border-bottom: 2px solid #fff3e0; padding-bottom: 8px;
        }
        .reg-item {
            display: flex; align-items: center; gap-10px;
            padding: 8px 0; border-bottom: 1px solid #f5f5f5;
        }
        .reg-avatar {
            width: 35px; height: 35px; border-radius: 50%;
            background: linear-gradient(135deg, #e65100, #f57c00);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 0.9rem; font-weight: 700;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<nav class="topnav">
    <a href="/dashboard" class="brand">
        <i class="bi bi-mortarboard-fill me-2"></i>Alumni Portal
    </a>
</nav>

<div class="container py-4" style="max-width:850px;">

    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/events">Events</a></li>
            <li class="breadcrumb-item active"
                th:text="${event.title}">Event</li>
        </ol>
    </nav>

    <!-- Event Banner -->
    <div class="event-banner">
        <h2 class="fw-bold mb-3" th:text="${event.title}"></h2>
        <div class="d-flex flex-wrap gap-3">
            <span th:if="${event.eventDate != null}">
                <i class="bi bi-calendar me-1"></i>
                <span th:text="${event.eventDate}"></span>
            </span>
            <span th:if="${event.eventTime != null}">
                <i class="bi bi-clock me-1"></i>
                <span th:text="${event.eventTime}"></span>
            </span>
            <span th:if="${event.location != null}">
                <i class="bi bi-geo-alt me-1"></i>
                <span th:text="${event.location}"></span>
            </span>
            <span>
                <i class="bi bi-people me-1"></i>
                <span th:text="${registrationCount}">0</span> Registered
            </span>
        </div>
    </div>

    <div class="row g-4">

        <!-- Description -->
        <div class="col-md-8">
            <div class="info-card">
                <h6><i class="bi bi-file-text me-2"></i>About This Event</h6>
                <p class="text-muted"
                   th:text="${event.description != null ?
                   event.description : 'No description available'}">
                </p>

                <!-- Register Button -->
                <div class="mt-3" th:if="${!isRegistered}">
                    <form th:action="@{/events/register/{id}(id=${event.id})}"
                          method="post">
                        <button type="submit"
                                class="btn btn-warning rounded-3 px-4 fw-semibold">
                            <i class="bi bi-calendar-check me-2"></i>
                            Register for this Event
                        </button>
                    </form>
                </div>
                <div class="mt-3" th:if="${isRegistered}">
                    <span class="badge bg-success fs-6 px-3 py-2">
                        <i class="bi bi-check-circle me-1"></i>
                        You are registered!
                    </span>
                </div>
            </div>
        </div>

        <!-- Registrations List -->
        <div class="col-md-4">
            <div class="info-card">
                <h6>
                    <i class="bi bi-people me-2"></i>
                    Registrations
                    (<span th:text="${registrationCount}">0</span>)
                </h6>
                <div th:if="${registrations.empty}"
                     class="text-muted text-center py-3">
                    <i class="bi bi-person-x fs-3"></i>
                    <p class="small mt-2">No registrations yet</p>
                </div>
                <div th:each="reg : ${registrations}" class="reg-item">
                    <div class="d-flex align-items-center gap-2">
                        <div class="reg-avatar"
                             th:text="${#strings.substring(
                             reg.user.username,0,1).toUpperCase()}">
                        </div>
                        <span class="small fw-semibold"
                              th:text="${reg.user.username}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="d-flex gap-3 mt-2">
        <a th:href="@{/events/edit/{id}(id=${event.id})}"
           class="btn btn-warning rounded-3 px-4"
           sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-pencil me-2"></i>Edit Event
        </a>
        <a href="/events"
           class="btn btn-outline-secondary rounded-3 px-4">
            <i class="bi bi-arrow-left me-2"></i>Back to Events
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
