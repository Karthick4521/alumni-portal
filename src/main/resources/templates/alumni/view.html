<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Alumni</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            padding: 15px 30px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .topnav .brand { color: white; font-size: 1.3rem; font-weight: 700; text-decoration: none; }
        .profile-header {
            background: linear-gradient(135deg, #1a237e, #1565c0);
            color: white; padding: 40px; border-radius: 20px;
            margin-bottom: 25px;
        }
        .avatar-large {
            width: 90px; height: 90px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 700; color: white;
            border: 3px solid rgba(255,255,255,0.4);
        }
        .info-card {
            background: white; border-radius: 16px;
            padding: 25px; box-shadow: 0 3px 15px rgba(0,0,0,0.07);
            margin-bottom: 20px;
        }
        .info-card h6 {
            font-size: 0.78rem; text-transform: uppercase;
            letter-spacing: 1px; color: #1a237e;
            font-weight: 700; margin-bottom: 15px;
            border-bottom: 2px solid #e8eaf6; padding-bottom: 8px;
        }
        .info-row { display: flex; margin-bottom: 12px; align-items: flex-start; }
        .info-label { width: 140px; font-weight: 600; color: #666; font-size: 0.88rem; flex-shrink: 0; }
        .info-value { color: #333; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="topnav">
    <a href="/dashboard" class="brand">
        <i class="bi bi-mortarboard-fill me-2"></i>Alumni Portal
    </a>
</div>

<div class="container py-4" style="max-width: 800px;">

    <nav class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/alumni">Alumni</a></li>
            <li class="breadcrumb-item active"
                th:text="${alumni.fullName}">Profile</li>
        </ol>
    </nav>

    <!-- Profile Header -->
    <div class="profile-header">
        <div class="d-flex align-items-center gap-4">
            <div class="avatar-large"
                 th:text="${#strings.substring(alumni.fullName,0,1)}">
            </div>
            <div>
                <h3 class="fw-bold mb-1"
                    th:text="${alumni.fullName}"></h3>
                <p class="mb-1 opacity-90"
                   th:text="${alumni.designation != null ?
                   alumni.designation : 'Alumni'}"></p>
                <p class="mb-0 opacity-75">
                    <i class="bi bi-building me-1"></i>
                    <span th:text="${alumni.company != null ?
                          alumni.company : 'Not specified'}"></span>
                    &nbsp;|&nbsp;
                    <i class="bi bi-geo-alt me-1"></i>
                    <span th:text="${alumni.location != null ?
                          alumni.location : 'Not specified'}"></span>
                </p>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Academic Info -->
        <div class="col-md-6">
            <div class="info-card">
                <h6><i class="bi bi-book me-2"></i>Academic Info</h6>
                <div class="info-row">
                    <span class="info-label">Department</span>
                    <span class="info-value"
                          th:text="${alumni.department != null ?
                          alumni.department : 'N/A'}"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Degree</span>
                    <span class="info-value"
                          th:text="${alumni.degree != null ?
                          alumni.degree : 'N/A'}"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Batch Year</span>
                    <span class="info-value"
                          th:text="${alumni.graduationYear != null ?
                          alumni.graduationYear : 'N/A'}"></span>
                </div>
            </div>
        </div>

        <!-- Contact Info -->
        <div class="col-md-6">
            <div class="info-card">
                <h6><i class="bi bi-telephone me-2"></i>Contact Info</h6>
                <div class="info-row">
                    <span class="info-label">Phone</span>
                    <span class="info-value"
                          th:text="${alumni.phone != null ?
                          alumni.phone : 'N/A'}"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span class="info-value"
                          th:text="${alumni.user != null ?
                          alumni.user.email : 'N/A'}"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">LinkedIn</span>
                    <span class="info-value">
                        <a th:if="${alumni.linkedinUrl != null}"
                           th:href="${alumni.linkedinUrl}"
                           target="_blank">View Profile</a>
                        <span th:unless="${alumni.linkedinUrl != null}">N/A</span>
                    </span>
                </div>
            </div>
        </div>

        <!-- Profile Summary -->
        <div class="col-12" th:if="${alumni.profileSummary != null}">
            <div class="info-card">
                <h6><i class="bi bi-file-text me-2"></i>About</h6>
                <p class="text-muted mb-0"
                   th:text="${alumni.profileSummary}"></p>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="d-flex gap-3 mt-3">
        <a th:href="@{/alumni/edit/{id}(id=${alumni.id})}"
           class="btn btn-warning rounded-3 px-4">
            <i class="bi bi-pencil me-2"></i>Edit Profile
        </a>
        <a href="/alumni" class="btn btn-outline-secondary rounded-3 px-4">
            <i class="bi bi-arrow-left me-2"></i>Back to List
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
