<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Alumni</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            padding: 15px 30px;
        }
        .topnav .brand {
            color: white; font-size: 1.3rem;
            font-weight: 700; text-decoration: none;
        }
        .form-card {
            background: white; border-radius: 20px;
            padding: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .form-label { font-weight: 600; font-size: 0.88rem; color: #444; }
        .form-control, .form-select {
            border-radius: 10px; border: 2px solid #e9ecef;
            padding: 10px 14px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #1a237e;
            box-shadow: none;
        }
        .btn-save {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            border: none; border-radius: 10px;
            padding: 12px 35px; color: white; font-weight: 600;
        }
        .btn-save:hover { color: white; opacity: 0.9; }
        .sec-title {
            font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; color: #1a237e;
            border-bottom: 2px solid #e8eaf6;
            padding-bottom: 8px; margin-bottom: 20px;
        }
    </style>
</head>
<body>

<nav class="topnav">
    <a href="/dashboard" class="brand">
        <i class="bi bi-mortarboard-fill me-2"></i>Alumni Portal
    </a>
</nav>

<div class="container py-4" style="max-width:850px;">

    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/alumni">Alumni</a></li>
            <li class="breadcrumb-item active">Add New Alumni</li>
        </ol>
    </nav>

    <div class="form-card">
        <h4 class="fw-bold mb-1 text-primary">
            <i class="bi bi-person-plus me-2"></i>Add New Alumni
        </h4>
        <p class="text-muted mb-4">Fill in the details to create alumni profile</p>

        <form th:action="@{/alumni/add}" th:object="${alumni}" method="post">

            <p class="sec-title">Personal Information</p>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Full Name *</label>
                    <input type="text" th:field="*{fullName}"
                           class="form-control"
                           placeholder="Enter full name">
                    <span class="text-danger small"
                          th:if="${#fields.hasErrors('fullName')}"
                          th:errors="*{fullName}">Name Error</span>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="text" th:field="*{phone}"
                           class="form-control"
                           placeholder="Enter phone number">
                </div>
            </div>

            <p class="sec-title">Academic Information</p>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label">Department</label>
                    <select th:field="*{department}" class="form-select">
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Civil">Civil</option>
                        <option value="Electrical">Electrical</option>
                        <option value="MBA">MBA</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Degree</label>
                    <select th:field="*{degree}" class="form-select">
                        <option value="">Select Degree</option>
                        <option value="B.E">B.E</option>
                        <option value="B.Tech">B.Tech</option>
                        <option value="M.E">M.E</option>
                        <option value="M.Tech">M.Tech</option>
                        <option value="MBA">MBA</option>
                        <option value="MCA">MCA</option>
                        <option value="BCA">BCA</option>
                        <option value="BSc">BSc</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Graduation Year</label>
                    <select th:field="*{graduationYear}" class="form-select">
                        <option value="">Select Year</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                        <option value="2021">2021</option>
                        <option value="2020">2020</option>
                        <option value="2019">2019</option>
                        <option value="2018">2018</option>
                        <option value="2017">2017</option>
                        <option value="2016">2016</option>
                        <option value="2015">2015</option>
                    </select>
                </div>
            </div>

            <p class="sec-title">Professional Information</p>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Company</label>
                    <input type="text" th:field="*{company}"
                           class="form-control"
                           placeholder="Company name">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Designation</label>
                    <input type="text" th:field="*{designation}"
                           class="form-control"
                           placeholder="Job title">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" th:field="*{location}"
                           class="form-control"
                           placeholder="City, State">
                </div>
                <div class="col-md-6">
                    <label class="form-label">LinkedIn URL</label>
                    <input type="text" th:field="*{linkedinUrl}"
                           class="form-control"
                           placeholder="linkedin.com/in/username">
                </div>
            </div>

            <p class="sec-title">Profile Summary</p>
            <div class="mb-4">
                <label class="form-label">About / Bio</label>
                <textarea th:field="*{profileSummary}"
                          class="form-control" rows="4"
                          placeholder="Brief description..."></textarea>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-save">
                    <i class="bi bi-check-circle me-2"></i>Save Alumni
                </button>
                <a href="/alumni"
                   class="btn btn-outline-secondary rounded-3 px-4">
                    <i class="bi bi-x-circle me-2"></i>Cancel
                </a>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
