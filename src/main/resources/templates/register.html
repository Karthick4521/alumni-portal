<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Portal - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #1565c0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }
        .register-card {
            background: white;
            border-radius: 24px;
            padding: 45px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .register-card h2 {
            font-weight: 700;
            color: #1a237e;
            margin-bottom: 5px;
        }
        .register-card p.subtitle {
            color: #888;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
        .role-selector { display: flex; gap: 15px; margin-bottom: 25px; }
        .role-card {
            flex: 1;
            border: 2px solid #e9ecef;
            border-radius: 14px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .role-card:hover { border-color: #1a237e; }
        .role-card.selected {
            border-color: #1a237e;
            background: #e8eaf6;
        }
        .role-card .role-icon { font-size: 2rem; margin-bottom: 8px; }
        .role-card .role-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
        }
        .form-label { font-weight: 600; color: #444; font-size: 0.9rem; }
        .form-control {
            border-radius: 10px;
            padding: 11px 15px;
            border: 2px solid #e9ecef;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            border-color: #1a237e;
            box-shadow: 0 0 0 0.2rem rgba(26,35,126,0.15);
        }
        .btn-register-submit {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-register-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(26,35,126,0.4);
            color: white;
        }
        .text-danger { font-size: 0.82rem; }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
        .login-link a { color: #1a237e; font-weight: 600; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="register-card">

    <!-- Header -->
    <div class="text-center mb-2">
        <span style="font-size: 3rem;">🎓</span>
    </div>
    <h2 class="text-center">Create Account</h2>
    <p class="subtitle text-center">Join the Alumni Portal community today</p>

    <form th:action="@{/register}" th:object="${user}" method="post">

        <!-- ROLE SELECTION -->
        <p class="form-label mb-2">I am a...</p>
        <div class="role-selector">
            <div class="role-card" id="alumniCard"
                 onclick="selectRole('ALUMNI')">
                <div class="role-icon">👨‍💼</div>
                <div class="role-name">Alumni</div>
            </div>
            <div class="role-card" id="studentCard"
                 onclick="selectRole('STUDENT')">
                <div class="role-icon">👨‍🎓</div>
                <div class="role-name">Student</div>
            </div>
        </div>
        <input type="hidden" id="roleInput" th:field="*{role}" required>

        <!-- USERNAME -->
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" th:field="*{username}"
                   class="form-control"
                   placeholder="Choose a username">
            <span class="text-danger"
                  th:if="${usernameError}"
                  th:text="${usernameError}"></span>
            <span class="text-danger"
                  th:if="${#fields.hasErrors('username')}"
                  th:errors="*{username}"></span>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" th:field="*{email}"
                   class="form-control"
                   placeholder="Enter your email">
            <span class="text-danger"
                  th:if="${emailError}"
                  th:text="${emailError}"></span>
            <span class="text-danger"
                  th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}"></span>
        </div>

        <!-- PASSWORD -->
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}"
                   class="form-control"
                   placeholder="Create a password (min 6 chars)">
            <span class="text-danger"
                  th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}"></span>
        </div>

        <button type="submit" class="btn btn-register-submit">
            <i class="bi bi-person-check me-2"></i>Create My Account
        </button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/login">Sign In</a>
    </div>
</div>

<script>
    function selectRole(role) {
        document.getElementById('roleInput').value = role;
        document.getElementById('alumniCard').classList.remove('selected');
        document.getElementById('studentCard').classList.remove('selected');
        if (role === 'ALUMNI') {
            document.getElementById('alumniCard').classList.add('selected');
        } else {
            document.getElementById('studentCard').classList.add('selected');
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
