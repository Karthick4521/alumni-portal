<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .topnav .brand {
            color: white; font-size: 1.3rem;
            font-weight: 700; text-decoration: none;
        }
        .topnav a {
            color: rgba(255,255,255,0.85);
            text-decoration: none; margin-left: 20px; font-size: 0.9rem;
        }
        .topnav a:hover { color: white; }
        .page-header {
            background: white; padding: 25px 30px;
            display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #e9ecef;
        }
        .student-card {
            background: white; border: none;
            border-radius: 14px; padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
        }
        .student-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        .avatar-circle {
            width: 55px; height: 55px; border-radius: 50%;
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.3rem; font-weight: 700;
        }
        .badge-dept {
            background: #e8f5e9; color: #1b5e20;
            border-radius: 20px; padding: 4px 12px;
            font-size: 0.78rem; font-weight: 600;
        }
        .year-badge {
            background: #fff3e0; color: #e65100;
            border-radius: 20px; padding: 3px 10px;
            font-size: 0.75rem; font-weight: 600;
        }
    </style>
</head>
<body>

<div class="topnav">
    <a href="/dashboard" class="brand">
        <i class="bi bi-mortarboard-fill me-2"></i>Alumni Portal
    </a>
    <div>
        <a href="/alumni"><i class="bi bi-people me-1"></i>Alumni</a>
        <a href="/events"><i class="bi bi-calendar me-1"></i>Events</a>
        <a href="/jobs"><i class="bi bi-briefcase me-1"></i>Jobs</a>
        <a href="/logout" style="color:#ff8a80;">
            <i class="bi bi-box-arrow-left me-1"></i>Logout
        </a>
    </div>
</div>

<div class="page-header">
    <div>
        <h4 class="fw-bold mb-1">
            <i class="bi bi-person-badge text-success me-2"></i>Student Management
        </h4>
        <p class="text-muted mb-0">
            Total: <strong th:text="${totalCount}">0</strong> students
        </p>
    </div>
    <a href="/students/add" class="btn btn-success rounded-3 px-4"
       sec:authorize="hasRole('ADMIN')">
        <i class="bi bi-person-plus me-2"></i>Add Student
    </a>
</div>

<div class="container-fluid p-4">

    <!-- Search Bar -->
    <div class="card border-0 shadow-sm rounded-3 p-3 mb-4">
        <form th:action="@{/students}" method="get" class="d-flex gap-2">
            <input type="text" name="keyword"
                   th:value="${keyword}"
                   class="form-control rounded-3"
                   placeholder="Search by name, department, enrollment no...">
            <button type="submit" class="btn btn-success rounded-3 px-4">
                <i class="bi bi-search me-1"></i>Search
            </button>
            <a href="/students"
               class="btn btn-outline-secondary rounded-3 px-3"
               th:if="${keyword != null}">Clear</a>
        </form>
    </div>

    <!-- Success Message -->
    <div th:if="${successMsg}"
         class="alert alert-success alert-dismissible rounded-3 mb-4">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty State -->
    <div th:if="${studentList.empty}" class="text-center py-5">
        <i class="bi bi-person-badge" style="font-size:4rem; color:#ccc;"></i>
        <h5 class="text-muted mt-3">No students found</h5>
        <a href="/students/add" class="btn btn-success mt-3"
           sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-person-plus me-2"></i>Add First Student
        </a>
    </div>

    <!-- Student Cards -->
    <div class="row g-4" th:if="${!studentList.empty}">
        <div class="col-md-6 col-lg-4"
             th:each="student : ${studentList}">
            <div class="student-card shadow-sm">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div class="avatar-circle"
                         th:text="${#strings.substring(student.fullName,0,1)}">
                    </div>
                    <div>
                        <h6 class="fw-bold mb-1"
                            th:text="${student.fullName}"></h6>
                        <span class="badge-dept"
                              th:text="${student.department != null ?
                              student.department : 'N/A'}"></span>
                    </div>
                </div>

                <div class="mb-3">
                    <p class="mb-1 small text-muted"
                       th:if="${student.enrollmentNo != null}">
                        <i class="bi bi-card-text me-1 text-success"></i>
                        <span th:text="${student.enrollmentNo}"></span>
                    </p>
                    <p class="mb-1 small text-muted"
                       th:if="${student.currentYear != null}">
                        <i class="bi bi-calendar me-1 text-warning"></i>
                        Year <span th:text="${student.currentYear}"></span>
                    </p>
                    <p class="mb-0 small text-muted"
                       th:if="${student.phone != null}">
                        <i class="bi bi-telephone me-1 text-info"></i>
                        <span th:text="${student.phone}"></span>
                    </p>
                </div>

                <div class="d-flex gap-2">
                    <a th:href="@{/students/view/{id}(id=${student.id})}"
                       class="btn btn-outline-success btn-sm flex-fill rounded-3">
                        <i class="bi bi-eye me-1"></i>View
                    </a>
                    <a th:href="@{/students/edit/{id}(id=${student.id})}"
                       class="btn btn-outline-warning btn-sm flex-fill rounded-3"
                       sec:authorize="hasRole('ADMIN')">
                        <i class="bi bi-pencil me-1"></i>Edit
                    </a>
                    <a th:href="@{/students/delete/{id}(id=${student.id})}"
                       class="btn btn-outline-danger btn-sm rounded-3"
                       sec:authorize="hasRole('ADMIN')"
                       onclick="return confirm('Delete this student?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
