<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            padding: 15px 30px;
        }
        .topnav .brand {
            color: white; font-size: 1.3rem;
            font-weight: 700; text-decoration: none;
        }
        .profile-header {
            background: linear-gradient(135deg, #1b5e20, #388e3c);
            color: white; padding: 40px;
            border-radius: 20px; margin-bottom: 25px;
        }
        .avatar-large {
            width: 90px; height: 90px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 700;
            border: 3px solid rgba(255,255,255,0.4);
        }
        .info-card {
            background: white; border-radius: 16px;
            padding: 25px; box-shadow: 0 3px 15px rgba(0,0,0,0.07);
            margin-bottom: 20px;
        }
        .info-card h6 {
            font-size: 0.78rem; text-transform: uppercase;
            letter-spacing: 1px; color: #1b5e20;
            font-weight: 700; margin-bottom: 15px;
            border-bottom: 2px solid #e8f5e9; padding-bottom: 8px;
        }
        .info-row { display: flex; margin-bottom: 12px; }
        .info-label {
            width: 140px; font-weight: 600;
            color: #666; font-size: 0.88rem; flex-shrink: 0;
        }
        .info-value { color: #333; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav class="topnav">
    <a href="/dashboard" class="brand">
        <i class="bi bi-mortarboard-fill me-2"></i>Alumni Portal
    </a>
</nav>

<div class="container py-4" style="max-width:800px;">

    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/students">Students</a></li>
            <li class="breadcrumb-item active"
                th:text="${student.fullName}">Profile</li>
        </ol>
    </nav>

    <!-- Profile Header -->
    <div class="profile-header">
        <div class="d-flex align-items-center gap-4">
            <div class="avatar-large"
                 th:text="${#strings.substring(student.fullName,0,1)}">
            </div>
            <div>
                <h3 class="fw-bold mb-1"
                    th:text="${student.fullName}"></h3>
                <p class="mb-1 opacity-90">
                    <i class="bi bi-person-badge me-1"></i>Student
                    <span th:if="${student.currentYear != null}">
                        — Year <span th:text="${student.currentYear}"></span>
                    </span>
                </p>
                <p class="mb-0 opacity-75"
                   th:if="${student.department != null}">
                    <i class="bi bi-book me-1"></i>
                    <span th:text="${student.department}"></span>
                </p>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="info-card">
                <h6><i class="bi bi-book me-2"></i>Academic Info</h6>
                <div class="info-row">
                    <span class="info-label">Enrollment No</span>
                    <span class="info-value"
                          th:text="${student.enrollmentNo != null ?
                          student.enrollmentNo : 'N/A'}"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Department</span>
                    <span class="info-value"
                          th:text="${student.department != null ?
                          student.department : 'N/A'}"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Current Year</span>
                    <span class="info-value"
                          th:text="${student.currentYear != null ?
                          student.currentYear : 'N/A'}"></span>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="info-card">
                <h6><i class="bi bi-telephone me-2"></i>Contact Info</h6>
                <div class="info-row">
                    <span class="info-label">Phone</span>
                    <span class="info-value"
                          th:text="${student.phone != null ?
                          student.phone : 'N/A'}"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span class="info-value"
                          th:text="${student.user != null ?
                          student.user.email : 'N/A'}"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex gap-3 mt-2">
        <a th:href="@{/students/edit/{id}(id=${student.id})}"
           class="btn btn-warning rounded-3 px-4">
            <i class="bi bi-pencil me-2"></i>Edit
        </a>
        <a href="/students"
           class="btn btn-outline-secondary rounded-3 px-4">
            <i class="bi bi-arrow-left me-2"></i>Back
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
