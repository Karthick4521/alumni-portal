<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            padding: 15px 30px;
            display: flex; justify-content: space-between;
            align-items: center; color: white;
        }
        .topnav .brand { font-size: 1.3rem; font-weight: 700; }
        .topnav .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none; margin-left: 25px;
            font-size: 0.95rem;
        }
        .topnav .nav-links a:hover { color: white; }
        .welcome-banner {
            background: linear-gradient(135deg, #1b5e20, #388e3c);
            color: white; padding: 40px;
            margin: 25px; border-radius: 20px;
        }
        .card-action {
            border: none; border-radius: 16px;
            transition: transform 0.2s;
        }
        .card-action:hover { transform: translateY(-4px); }
    </style>
</head>
<body>

<div class="topnav">
    <div class="brand">
        <i class="bi bi-mortarboard-fill me-2"></i>Alumni Portal
    </div>
    <div class="nav-links">
        <a href="/alumni/directory"><i class="bi bi-search me-1"></i>Directory</a>
        <a href="/events"><i class="bi bi-calendar me-1"></i>Events</a>
        <a href="/jobs"><i class="bi bi-briefcase me-1"></i>Jobs</a>
        <a href="/logout" style="color:#ff8a80;">
            <i class="bi bi-box-arrow-left me-1"></i>Logout
        </a>
    </div>
</div>

<div class="welcome-banner">
    <h3 class="fw-bold mb-1">
        Hello Student! 🎓
        <span sec:authentication="name">Student</span>
    </h3>
    <p class="mb-0" style="opacity:0.85;">
        Connect with alumni and explore career opportunities
    </p>
</div>

<div class="container-fluid px-4">
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card card-action shadow-sm p-4 text-center">
                <i class="bi bi-search fs-1 text-primary mb-3"></i>
                <h6 class="fw-bold">Alumni Directory</h6>
                <p class="text-muted small">Connect with alumni</p>
                <a href="/alumni/directory" class="btn btn-primary btn-sm">Open</a>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-action shadow-sm p-4 text-center">
                <i class="bi bi-calendar-event fs-1 text-warning mb-3"></i>
                <h6 class="fw-bold">Events</h6>
                <p class="text-muted small">Join campus events</p>
                <a href="/events" class="btn btn-warning btn-sm">Open</a>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-action shadow-sm p-4 text-center">
                <i class="bi bi-briefcase fs-1 text-success mb-3"></i>
                <h6 class="fw-bold">Job Portal</h6>
                <p class="text-muted small">Apply for jobs</p>
                <a href="/jobs" class="btn btn-success btn-sm">Open</a>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-action shadow-sm p-4 text-center">
                <i class="bi bi-person-circle fs-1 text-info mb-3"></i>
                <h6 class="fw-bold">My Profile</h6>
                <p class="text-muted small">View your profile</p>
                <a href="/student/profile" class="btn btn-info btn-sm text-white">Open</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
