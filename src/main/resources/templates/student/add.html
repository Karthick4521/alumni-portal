<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            padding: 15px 30px;
        }
        .topnav .brand {
            color: white; font-size: 1.3rem;
            font-weight: 700; text-decoration: none;
        }
        .form-card {
            background: white; border-radius: 20px;
            padding: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .sec-title {
            font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; color: #1b5e20;
            border-bottom: 2px solid #e8f5e9;
            padding-bottom: 8px; margin-bottom: 20px;
        }
        .form-label { font-weight: 600; font-size: 0.88rem; color: #444; }
        .form-control, .form-select {
            border-radius: 10px; border: 2px solid #e9ecef; padding: 10px 14px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #1b5e20; box-shadow: none;
        }
        .btn-save {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            border: none; border-radius: 10px;
            padding: 12px 35px; color: white; font-weight: 600;
        }
        .btn-save:hover { color: white; opacity: 0.9; }
    </style>
</head>
<body>

<nav class="topnav">
    <a href="/dashboard" class="brand">
        <i class="bi bi-mortarboard-fill me-2"></i>Alumni Portal
    </a>
</nav>

<div class="container py-4" style="max-width:750px;">

    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/students">Students</a></li>
            <li class="breadcrumb-item active">Add New Student</li>
        </ol>
    </nav>

    <div class="form-card">
        <h4 class="fw-bold mb-1" style="color:#1b5e20;">
            <i class="bi bi-person-plus me-2"></i>Add New Student
        </h4>
        <p class="text-muted mb-4">Fill in the student details below</p>

        <form th:action="@{/students/add}"
              th:object="${student}" method="post">

            <p class="sec-title">Personal Information</p>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Full Name *</label>
                    <input type="text" th:field="*{fullName}"
                           class="form-control"
                           placeholder="Enter full name">
                    <span class="text-danger small"
                          th:if="${#fields.hasErrors('fullName')}"
                          th:errors="*{fullName}"></span>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="text" th:field="*{phone}"
                           class="form-control"
                           placeholder="Enter phone number">
                </div>
            </div>

            <p class="sec-title">Academic Information</p>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label">Enrollment No</label>
                    <input type="text" th:field="*{enrollmentNo}"
                           class="form-control"
                           placeholder="Enrollment number">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Department</label>
                    <select th:field="*{department}" class="form-select">
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Civil">Civil</option>
                        <option value="Electrical">Electrical</option>
                        <option value="MBA">MBA</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Current Year</label>
                    <select th:field="*{currentYear}" class="form-select">
                        <option value="">Select Year</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-save">
                    <i class="bi bi-check-circle me-2"></i>Save Student
                </button>
                <a href="/students"
                   class="btn btn-outline-secondary rounded-3 px-4">
                    <i class="bi bi-x-circle me-2"></i>Cancel
                </a>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
