<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Post Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #880e4f, #c2185b);
            padding: 15px 30px;
        }
        .topnav .brand {
            color: white; font-size: 1.3rem;
            font-weight: 700; text-decoration: none;
        }
        .form-card {
            background: white; border-radius: 20px;
            padding: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .sec-title {
            font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; color: #880e4f;
            border-bottom: 2px solid #fce4ec;
            padding-bottom: 8px; margin-bottom: 20px;
        }
        .form-label { font-weight: 600; font-size: 0.88rem; color: #444; }
        .form-control {
            border-radius: 10px; border: 2px solid #e9ecef; padding: 10px 14px;
        }
        .form-control:focus {
            border-color: #c2185b; box-shadow: none;
        }
        .btn-save {
            background: linear-gradient(135deg, #880e4f, #c2185b);
            border: none; border-radius: 10px;
            padding: 12px 35px; color: white; font-weight: 600;
        }
        .btn-save:hover { color: white; opacity: 0.9; }
    </style>
</head>
<body>

<nav class="topnav">
    <a href="/dashboard" class="brand">
        <i class="bi bi-mortarboard-fill me-2"></i>Alumni Portal
    </a>
</nav>

<div class="container py-4" style="max-width:800px;">

    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/jobs">Jobs</a></li>
            <li class="breadcrumb-item active">Post New Job</li>
        </ol>
    </nav>

    <div class="form-card">
        <h4 class="fw-bold mb-1" style="color:#880e4f;">
            <i class="bi bi-briefcase me-2"></i>Post New Job
        </h4>
        <p class="text-muted mb-4">Fill in the job details below</p>

        <form th:action="@{/jobs/add}" th:object="${job}" method="post">

            <p class="sec-title">Job Information</p>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Job Title *</label>
                    <input type="text" th:field="*{title}"
                           class="form-control"
                           placeholder="e.g. Software Engineer">
                    <span class="text-danger small"
                          th:if="${#fields.hasErrors('title')}"
                          th:errors="*{title}"></span>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Company *</label>
                    <input type="text" th:field="*{company}"
                           class="form-control"
                           placeholder="Company name">
                    <span class="text-danger small"
                          th:if="${#fields.hasErrors('company')}"
                          th:errors="*{company}"></span>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" th:field="*{location}"
                           class="form-control"
                           placeholder="City or Remote">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Salary Range</label>
                    <input type="text" th:field="*{salaryRange}"
                           class="form-control"
                           placeholder="e.g. 3-5 LPA">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last Date to Apply</label>
                    <input type="date" th:field="*{lastDate}"
                           class="form-control">
                </div>
            </div>

            <p class="sec-title">Details</p>
            <div class="row g-3 mb-4">
                <div class="col-12">
                    <label class="form-label">Job Description</label>
                    <textarea th:field="*{description}"
                              class="form-control" rows="4"
                              placeholder="Describe the job role..."></textarea>
                </div>
                <div class="col-12">
                    <label class="form-label">Requirements</label>
                    <textarea th:field="*{requirements}"
                              class="form-control" rows="3"
                              placeholder="Skills and qualifications required..."></textarea>
                </div>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-save">
                    <i class="bi bi-check-circle me-2"></i>Post Job
                </button>
                <a href="/jobs"
                   class="btn btn-outline-secondary rounded-3 px-4">
                    <i class="bi bi-x-circle me-2"></i>Cancel
                </a>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
