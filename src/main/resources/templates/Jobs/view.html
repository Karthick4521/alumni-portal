<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Job Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #880e4f, #c2185b);
            padding: 15px 30px;
        }
        .topnav .brand {
            color: white; font-size: 1.3rem;
            font-weight: 700; text-decoration: none;
        }
        .job-banner {
            background: linear-gradient(135deg, #880e4f, #c2185b);
            color: white; padding: 40px;
            border-radius: 20px; margin-bottom: 25px;
        }
        .info-card {
            background: white; border-radius: 16px;
            padding: 25px; box-shadow: 0 3px 15px rgba(0,0,0,0.07);
            margin-bottom: 20px;
        }
        .info-card h6 {
            font-size: 0.78rem; text-transform: uppercase;
            letter-spacing: 1px; color: #880e4f;
            font-weight: 700; margin-bottom: 15px;
            border-bottom: 2px solid #fce4ec; padding-bottom: 8px;
        }
        .apply-btn {
            background: linear-gradient(135deg, #880e4f, #c2185b);
            border: none; border-radius: 10px;
            padding: 12px 30px; color: white; font-weight: 600;
            font-size: 1rem;
        }
        .apply-btn:hover { color: white; opacity: 0.9; }
        .applicant-item {
            padding: 8px 0; border-bottom: 1px solid #f5f5f5;
            display: flex; align-items: center; gap: 10px;
        }
        .app-avatar {
            width: 35px; height: 35px; border-radius: 50%;
            background: linear-gradient(135deg, #880e4f, #c2185b);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 0.9rem; font-weight: 700;
        }
    </style>
</head>
<body>

<nav class="topnav">
    <a href="/dashboard" class="brand">
        <i class="bi bi-mortarboard-fill me-2"></i>Alumni Portal
    </a>
</nav>

<div class="container py-4" style="max-width:900px;">

    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/jobs">Jobs</a></li>
            <li class="breadcrumb-item active"
                th:text="${job.title}">Job</li>
        </ol>
    </nav>

    <!-- Messages -->
    <div th:if="${successMsg}"
         class="alert alert-success rounded-3 mb-4">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}"
         class="alert alert-danger rounded-3 mb-4">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${errorMsg}"></span>
    </div>

    <!-- Job Banner -->
    <div class="job-banner">
        <h2 class="fw-bold mb-2" th:text="${job.title}"></h2>
        <h5 class="mb-3 opacity-90"
            th:text="${job.company}"></h5>
        <div class="d-flex flex-wrap gap-3">
            <span th:if="${job.location != null}">
                <i class="bi bi-geo-alt me-1"></i>
                <span th:text="${job.location}"></span>
            </span>
            <span th:if="${job.salaryRange != null}">
                <i class="bi bi-currency-rupee me-1"></i>
                <span th:text="${job.salaryRange}"></span>
            </span>
            <span th:if="${job.lastDate != null}">
                <i class="bi bi-calendar-x me-1"></i>
                Apply by: <span th:text="${job.lastDate}"></span>
            </span>
            <span>
                <i class="bi bi-people me-1"></i>
                <span th:text="${applicationCount}">0</span> Applied
            </span>
        </div>
    </div>

    <div class="row g-4">

        <!-- Job Details -->
        <div class="col-md-8">

            <!-- Description -->
            <div class="info-card" th:if="${job.description != null}">
                <h6><i class="bi bi-file-text me-2"></i>Job Description</h6>
                <p class="text-muted mb-0"
                   th:text="${job.description}"></p>
            </div>

            <!-- Requirements -->
            <div class="info-card" th:if="${job.requirements != null}">
                <h6><i class="bi bi-list-check me-2"></i>Requirements</h6>
                <p class="text-muted mb-0"
                   th:text="${job.requirements}"></p>
            </div>

            <!-- Apply Section -->
            <div class="info-card">
                <h6><i class="bi bi-send me-2"></i>Apply for this Job</h6>

                <!-- Already Applied -->
                <div th:if="${hasApplied}">
                    <span class="badge bg-success fs-6 px-3 py-2">
                        <i class="bi bi-check-circle me-1"></i>
                        Application Submitted!
                    </span>
                </div>

                <!-- Apply Form -->
                <div th:unless="${hasApplied}">
                    <form th:action="@{/jobs/apply/{id}(id=${job.id})}"
                          method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Cover Letter (Optional)
                            </label>
                            <textarea name="coverLetter"
                                      class="form-control" rows="4"
                                      placeholder="Why are you a good fit for this role?"></textarea>
                        </div>
                        <button type="submit" class="apply-btn btn">
                            <i class="bi bi-send me-2"></i>Submit Application
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Applicants List (Admin only) -->
        <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
            <div class="info-card">
                <h6>
                    <i class="bi bi-people me-2"></i>
                    Applicants
                    (<span th:text="${applicationCount}">0</span>)
                </h6>
                <div th:if="${applications.empty}"
                     class="text-center text-muted py-3">
                    <i class="bi bi-person-x fs-3"></i>
                    <p class="small mt-2">No applications yet</p>
                </div>
                <div th:each="app : ${applications}"
                     class="applicant-item">
                    <div class="app-avatar"
                         th:text="${#strings.substring(
                         app.user.username,0,1).toUpperCase()}">
                    </div>
                    <div>
                        <div class="fw-semibold small"
                             th:text="${app.user.username}"></div>
                        <span class="badge rounded-pill"
                              th:classappend="${app.status.name() == 'PENDING'} ?
                              'bg-warning text-dark' :
                              (${app.status.name() == 'ACCEPTED'} ?
                              'bg-success' : 'bg-secondary')"
                              th:text="${app.status}">
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="d-flex gap-3 mt-2">
        <a th:href="@{/jobs/edit/{id}(id=${job.id})}"
           class="btn btn-warning rounded-3 px-4"
           sec:authorize="hasAnyRole('ADMIN','ALUMNI')">
            <i class="bi bi-pencil me-2"></i>Edit Job
        </a>
        <a href="/jobs"
           class="btn btn-outline-secondary rounded-3 px-4">
            <i class="bi bi-arrow-left me-2"></i>Back to Jobs
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
