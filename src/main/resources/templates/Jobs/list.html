<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Job Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #880e4f, #c2185b);
            padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .topnav .brand {
            color: white; font-size: 1.3rem;
            font-weight: 700; text-decoration: none;
        }
        .topnav a {
            color: rgba(255,255,255,0.85);
            text-decoration: none; margin-left: 20px; font-size: 0.9rem;
        }
        .topnav a:hover { color: white; }
        .page-header {
            background: white; padding: 25px 30px;
            display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #e9ecef;
        }
        .job-card {
            background: white; border: none;
            border-radius: 16px; padding: 22px;
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
            border-left: 4px solid #c2185b;
        }
        .job-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        .company-badge {
            background: #fce4ec; color: #880e4f;
            border-radius: 20px; padding: 4px 12px;
            font-size: 0.78rem; font-weight: 600;
        }
        .salary-tag {
            background: #e8f5e9; color: #1b5e20;
            border-radius: 20px; padding: 3px 10px;
            font-size: 0.75rem; font-weight: 600;
        }
    </style>
</head>
<body>

<div class="topnav">
    <a href="/dashboard" class="brand">
        <i class="bi bi-mortarboard-fill me-2"></i>Alumni Portal
    </a>
    <div>
        <a href="/alumni"><i class="bi bi-people me-1"></i>Alumni</a>
        <a href="/events"><i class="bi bi-calendar me-1"></i>Events</a>
        <a href="/students"><i class="bi bi-person-badge me-1"></i>Students</a>
        <a href="/logout" style="color:#f48fb1;">
            <i class="bi bi-box-arrow-left me-1"></i>Logout
        </a>
    </div>
</div>

<div class="page-header">
    <div>
        <h4 class="fw-bold mb-1">
            <i class="bi bi-briefcase-fill me-2" style="color:#c2185b;"></i>
            Job Portal
        </h4>
        <p class="text-muted mb-0">
            <strong th:text="${totalCount}">0</strong> jobs available
        </p>
    </div>
    <a href="/jobs/add" class="btn rounded-3 px-4 fw-semibold"
       style="background:#c2185b; color:white;"
       sec:authorize="hasAnyRole('ADMIN','ALUMNI')">
        <i class="bi bi-plus-circle me-2"></i>Post Job
    </a>
</div>

<div class="container-fluid p-4">

    <!-- Search -->
    <div class="card border-0 shadow-sm rounded-3 p-3 mb-4">
        <form th:action="@{/jobs}" method="get" class="d-flex gap-2">
            <input type="text" name="keyword"
                   th:value="${keyword}"
                   class="form-control rounded-3"
                   placeholder="Search jobs by title, company, location...">
            <button type="submit" class="btn rounded-3 px-4"
                    style="background:#c2185b; color:white;">
                <i class="bi bi-search me-1"></i>Search
            </button>
            <a href="/jobs"
               class="btn btn-outline-secondary rounded-3"
               th:if="${keyword != null}">Clear</a>
        </form>
    </div>

    <!-- Messages -->
    <div th:if="${successMsg}"
         class="alert alert-success alert-dismissible rounded-3 mb-4">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}"
         class="alert alert-danger alert-dismissible rounded-3 mb-4">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty State -->
    <div th:if="${jobList.empty}" class="text-center py-5">
        <i class="bi bi-briefcase" style="font-size:4rem; color:#ccc;"></i>
        <h5 class="text-muted mt-3">No jobs posted yet</h5>
        <a href="/jobs/add" class="btn mt-3 rounded-3 px-4"
           style="background:#c2185b; color:white;"
           sec:authorize="hasAnyRole('ADMIN','ALUMNI')">
            <i class="bi bi-plus-circle me-2"></i>Post First Job
        </a>
    </div>

    <!-- Jobs Grid -->
    <div class="row g-4" th:if="${!jobList.empty}">
        <div class="col-md-6 col-lg-4"
             th:each="job : ${jobList}">
            <div class="job-card shadow-sm">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 class="fw-bold mb-0"
                        th:text="${job.title}"></h5>
                </div>
                <span class="company-badge mb-3 d-inline-block"
                      th:text="${job.company}"></span>

                <div class="mb-3">
                    <p class="mb-1 small text-muted"
                       th:if="${job.location != null}">
                        <i class="bi bi-geo-alt me-1 text-danger"></i>
                        <span th:text="${job.location}"></span>
                    </p>
                    <p class="mb-1 small text-muted"
                       th:if="${job.salaryRange != null}">
                        <i class="bi bi-currency-rupee me-1 text-success"></i>
                        <span th:text="${job.salaryRange}"></span>
                    </p>
                    <p class="mb-1 small text-muted"
                       th:if="${job.lastDate != null}">
                        <i class="bi bi-calendar-x me-1 text-warning"></i>
                        Apply by: <span th:text="${job.lastDate}"></span>
                    </p>
                </div>

                <p class="small text-muted mb-3"
                   th:if="${job.description != null}"
                   th:text="${#strings.abbreviate(job.description, 80)}">
                </p>

                <div class="d-flex gap-2">
                    <a th:href="@{/jobs/view/{id}(id=${job.id})}"
                       class="btn btn-sm flex-fill rounded-3 fw-semibold"
                       style="background:#c2185b; color:white;">
                        <i class="bi bi-eye me-1"></i>View & Apply
                    </a>
                    <a th:href="@{/jobs/edit/{id}(id=${job.id})}"
                       class="btn btn-outline-warning btn-sm rounded-3"
                       sec:authorize="hasAnyRole('ADMIN','ALUMNI')">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/jobs/delete/{id}(id=${job.id})}"
                       class="btn btn-outline-danger btn-sm rounded-3"
                       sec:authorize="hasRole('ADMIN')"
                       onclick="return confirm('Delete this job?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
